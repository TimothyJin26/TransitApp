name: transitapp
description: Vancouver real-time transit app.

version: 1.0.7+1

environment:
  sdk: ">=3.3.0 <4.0.0"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "images/app-icon.png"
  adaptive_icon_background: "images/app-icon-background.png"
  adaptive_icon_foreground: "images/app-icon-foreground.png"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.0
  http: ^1.2.0
  json_annotation: ^4.9.0
  carousel_slider_plus: ^7.1.1
  url_launcher: ^6.3.0
  vibration: ^2.0.0
  app_settings: ^5.1.1
  archive: ^3.6.1
  xml: ^6.5.0
  async: ^2.11.0
  connectivity_plus: ^6.1.3
  path_provider: ^2.1.0
  auto_size_text: ^3.0.0
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - images/
